name: chatwoot_flutter
description: Aplicativo Flutter para o Chatwoot - Customer Engagement Suite

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # UI e Navegação
  cupertino_icons: ^1.0.6
  
  # Estado e Arquitetura
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Rede e API
  http: ^1.1.0
  dio: ^5.3.2
  web_socket_channel: ^2.4.0
  
  # Armazenamento Local
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utilitários
  intl: ^0.18.1
  uuid: ^4.1.0
  path_provider: ^2.1.1
  
  # Imagens e Mídia
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  
  # Notificações
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0
  
  # Permissões
  permission_handler: ^11.1.0
  
  # Formatação e Validação
  mask_text_input_formatter: ^2.5.0
  
  # Animações
  lottie: ^2.7.0
  
  # Outros
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  package_info_plus: ^4.2.0
  device_info_plus: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting e Análise
  flutter_lints: ^3.0.1
  
  # Geração de Código
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  # Fontes customizadas
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

